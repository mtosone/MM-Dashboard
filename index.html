<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKEX Market Maker Coverage Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg-primary: #0f1419;
  --bg-secondary: #1a2332;
  --bg-tertiary: #243447;
  --bg-card: #1e2d3d;
  --text-primary: #e7e9ea;
  --text-secondary: #8b98a5;
  --text-muted: #657786;
  --green: #00c853;
  --green-bg: rgba(0, 200, 83, 0.15);
  --red: #ff5252;
  --red-bg: rgba(255, 82, 82, 0.12);
  --amber: #ffab00;
  --amber-bg: rgba(255, 171, 0, 0.15);
  --blue: #1d9bf0;
  --blue-bg: rgba(29, 155, 240, 0.15);
  --border: #38444d;
  --hover: #2c3e50;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.header h1 span {
  color: var(--blue);
}

.stats-bar {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
}

.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-green .stat-value { color: var(--green); }
.stat-amber .stat-value { color: var(--amber); }
.stat-red .stat-value { color: var(--red); }
.stat-blue .stat-value { color: var(--blue); }

.tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-primary);
  padding: 4px;
  border-radius: 8px;
  margin: 16px 24px 0;
  overflow-x: auto;
}

.tab {
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all 0.2s;
  border: none;
  background: none;
}

.tab:hover {
  color: var(--text-primary);
  background: var(--bg-tertiary);
}

.tab.active {
  background: var(--blue);
  color: #fff;
}

.filters {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-group label {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input[type="text"], select {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

input[type="text"]:focus, select:focus {
  border-color: var(--blue);
}

input[type="text"] {
  width: 200px;
}

.btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  transition: all 0.2s;
}

.btn:hover {
  background: var(--hover);
  border-color: var(--blue);
}

.btn-primary {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}

.btn-primary:hover {
  background: #1a8cd8;
}

.content {
  padding: 24px;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* Matrix table styles */
.matrix-container {
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.matrix-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.matrix-table th, .matrix-table td {
  padding: 10px 12px;
  border: 1px solid var(--border);
  text-align: center;
  white-space: nowrap;
}

.matrix-table thead th {
  background: var(--bg-tertiary);
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 10;
  color: var(--text-primary);
}

.matrix-table tbody td:first-child,
.matrix-table tbody td:nth-child(2) {
  text-align: left;
  font-weight: 500;
  background: var(--bg-secondary);
}

.responses-table tbody td:first-child,
.responses-table tbody td:nth-child(2) {
  background: none;
}
}

.matrix-table .sport-header {
  background: var(--bg-tertiary) !important;
  font-weight: 700;
  text-align: left !important;
  color: var(--blue);
  font-size: 14px;
}

.cell-yes {
  background: var(--green-bg);
  color: var(--green);
  font-weight: 600;
}

.cell-no {
  background: var(--red-bg);
  color: var(--text-muted);
}

.cell-maybe {
  background: var(--amber-bg);
  color: var(--amber);
  font-weight: 500;
}

.cell-blank {
  background: rgba(101, 119, 134, 0.08);
  color: var(--text-muted);
}

.coverage-pct {
  font-size: 11px;
  color: var(--text-secondary);
  display: block;
  margin-top: 2px;
}

/* MM Profile Cards */
.profiles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px;
}

.profile-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  transition: border-color 0.2s;
}

.profile-card:hover {
  border-color: var(--blue);
}

.profile-card h3 {
  font-size: 18px;
  margin-bottom: 12px;
  color: var(--blue);
}

.profile-stats {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
}

.profile-stat {
  text-align: center;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border-radius: 6px;
  flex: 1;
}

.profile-stat .val {
  font-size: 18px;
  font-weight: 700;
}

.profile-stat .lbl {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.profile-notes {
  margin-top: 12px;
}

.profile-notes h4 {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.note-item {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.4;
}

.note-item:last-child {
  border-bottom: none;
}

.note-tag {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  margin-right: 6px;
}

.tag-league {
  background: var(--blue-bg);
  color: var(--blue);
}

.tag-market {
  background: var(--green-bg);
  color: var(--green);
}

.tag-general {
  background: var(--amber-bg);
  color: var(--amber);
}

/* Notes table */
.notes-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.notes-table th, .notes-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

.notes-table th {
  background: var(--bg-tertiary);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
}

.notes-table tr:hover {
  background: var(--hover);
}

/* Gap Analysis */
.gap-section {
  margin-bottom: 32px;
}

.gap-section h3 {
  font-size: 16px;
  margin-bottom: 12px;
  color: var(--text-primary);
}

.gap-item {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
}

.gap-item .gap-name {
  flex: 1;
  font-weight: 500;
}

.gap-item .gap-count {
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
}

.gap-critical { border-left: 4px solid var(--red); }
.gap-critical .gap-count { background: var(--red-bg); color: var(--red); }

.gap-warning { border-left: 4px solid var(--amber); }
.gap-warning .gap-count { background: var(--amber-bg); color: var(--amber); }

.gap-good { border-left: 4px solid var(--green); }
.gap-good .gap-count { background: var(--green-bg); color: var(--green); }

/* Compare */
.compare-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.compare-select {
  margin-bottom: 24px;
  display: flex;
  gap: 16px;
  align-items: center;
}

.compare-col {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.compare-col h3 {
  font-size: 16px;
  color: var(--blue);
  margin-bottom: 16px;
}

.compare-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.compare-row:last-child { border-bottom: none; }

.compare-label {
  color: var(--text-secondary);
}

/* Export */
.export-btns {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

/* Responsive */
@media (max-width: 768px) {
  .stats-bar { gap: 12px; }
  .filters { flex-direction: column; align-items: flex-start; }
  .profiles-grid { grid-template-columns: 1fr; }
  .compare-container { grid-template-columns: 1fr; }
  input[type="text"] { width: 100%; }
}

.live-date {
  font-size: 11px;
  color: var(--text-muted);
}

.hidden { display: none !important; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-tertiary);
  border: 1px solid var(--green);
  color: var(--green);
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
}

.toast.show { opacity: 1; }

.legend {
  display: flex;
  gap: 16px;
  padding: 8px 0;
  margin-bottom: 12px;
  font-size: 12px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 3px;
}

.legend-dot.yes { background: var(--green-bg); border: 1px solid var(--green); }
.legend-dot.no { background: var(--red-bg); border: 1px solid var(--text-muted); }
.legend-dot.maybe { background: var(--amber-bg); border: 1px solid var(--amber); }

.mm-header-cell {
  font-size: 12px;
  min-width: 80px;
}

.group-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1><span>DKEX</span> Market Maker Coverage Dashboard</h1>
    <div class="export-btns">
      <button class="btn" onclick="exportJSON()">Export JSON</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="tabs" id="tabBar">
  <button class="tab active" data-tab="leagues">League Coverage</button>
  <button class="tab" data-tab="markets">Market Coverage</button>
  <button class="tab" data-tab="profiles">MM Profiles</button>
  <button class="tab" data-tab="gaps">Gap Analysis</button>
  <button class="tab" data-tab="responses">MM Responses</button>
</div>

<div class="filters" id="filtersBar">
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="searchInput" placeholder="Search leagues, markets, MMs...">
  </div>
  <div class="filter-group">
    <label>Sport</label>
    <select id="sportFilter"><option value="">All Sports</option></select>
  </div>
  <div class="filter-group" id="marketGroupFilterGroup">
    <label>Market Group</label>
    <select id="marketGroupFilter"><option value="">All Groups</option></select>
  </div>
  <div class="filter-group">
    <label>Coverage</label>
    <select id="coverageFilter">
      <option value="">All</option>
      <option value="yes">Yes Only</option>
      <option value="maybe">Maybe Only</option>
      <option value="gaps">Gaps (&lt;3 MMs)</option>
    </select>
  </div>
  <div class="filter-group" id="liveDateFilterGroup">
    <label>Live Date</label>
    <select id="liveDateFilter">
      <option value="">All Dates</option>
    </select>
  </div>
</div>

<div class="content">

  <div class="tab-content" id="tab-markets"></div>
  <div class="tab-content" id="tab-profiles"></div>
  <div class="tab-content" id="tab-gaps"></div>
  <div class="tab-content" id="tab-responses"></div>
</div>

<div class="toast" id="toast"></div>

// ==================== UTILITY FUNCTIONS ====================
function normalize(val) {
  if (val === null || val === undefined) return 'blank';
  const v = String(val).trim().toLowerCase();
  if (['y', 'yes', 'true', '1', 'x', 'full', 'covered'].includes(v)) return 'yes';
  if (['n', 'no', 'false', '0'].includes(v)) return 'no';
  if (v === '' || v === 'blank') return 'blank';
  if (['maybe', 'tbd', 'partial', 'hopefully day 1', 'mid june'].includes(v)) return 'maybe';
  if (v.includes('maybe')) return 'maybe';
  return 'maybe';
}

function cellClass(val) {
  const n = normalize(val);
  if (n === 'yes') return 'cell-yes';
  if (n === 'no') return 'cell-no';
  if (n === 'maybe') return 'cell-maybe';
  return 'cell-blank';
}

function cellDisplay(val) {
  const n = normalize(val);
  if (n === 'yes') return 'Y';
  if (n === 'no') return 'N';
  if (n === 'maybe') return '?';
  return '-';
}

function countCoverage(coverageArr, type) {
  return coverageArr.filter(v => normalize(v) === type).length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== STATS ====================
function computeStats() {
  let totalLeagues = leagueData.length;
  let totalMarkets = marketData.length;
  let gaps = 0;
  let maybeCount = 0;

  leagueData.forEach(l => {
    const yesCount = countCoverage(l.coverage, 'yes');
    if (yesCount < 3) gaps++;
    maybeCount += countCoverage(l.coverage, 'maybe');
  });

  marketData.forEach(m => {
    const yesCount = countCoverage(m.coverage, 'yes');
    if (yesCount < 3) gaps++;
    maybeCount += countCoverage(m.coverage, 'maybe');
  });

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item stat-blue"><div><div class="stat-value">${MMs.length}</div><div class="stat-label">Market Makers</div></div></div>
    <div class="stat-item stat-blue"><div><div class="stat-value">${totalLeagues}</div><div class="stat-label">Leagues</div></div></div>
    <div class="stat-item stat-blue"><div><div class="stat-value">${totalMarkets}</div><div class="stat-label">Markets</div></div></div>
    <div class="stat-item stat-red"><div><div class="stat-value">${gaps}</div><div class="stat-label">Coverage Gaps (&lt;3 MMs)</div></div></div>
    <div class="stat-item stat-amber"><div><div class="stat-value">${maybeCount}</div><div class="stat-label">Follow-up Needed</div></div></div>
  `;
}

function populateFilters() {
  const leagueSports = leagueData.map(l => l.sport);
  const marketSports = marketData.map(m => getLeagueSport(m.league));
  const sports = [...new Set([...leagueSports, ...marketSports])].filter(s => s).sort();
  const sportSel = document.getElementById('sportFilter');
  sports.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sportSel.appendChild(opt);
  });

  const groups = [...new Set(marketData.map(m => m.group).filter(g => g))].sort();
  const groupSel = document.getElementById('marketGroupFilter');
  groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    groupSel.appendChild(opt);
  });

  const allDates = [...new Set([
    ...leagueData.map(l => l.liveDate),
    ...marketData.map(m => m.liveDate)
  ])].filter(d => d && d !== 'TBD').sort();
  const dateSel = document.getElementById('liveDateFilter');
  allDates.forEach(d => {

function getFilters() {
  return {
    search: document.getElementById('searchInput').value.toLowerCase(),
    sport: document.getElementById('sportFilter').value,
    marketGroup: document.getElementById('marketGroupFilter').value,
    coverage: document.getElementById('coverageFilter').value,
    liveDate: document.getElementById('liveDateFilter').value
  };
}

function filterLeague(item, filters) {
  if (filters.search && !item.league.toLowerCase().includes(filters.search) && !item.sport.toLowerCase().includes(filters.search)) return false;
  if (filters.sport && item.sport !== filters.sport) return false;
  if (filters.coverage === 'yes' && countCoverage(item.coverage, 'yes') === 0) return false;
  if (filters.coverage === 'maybe' && countCoverage(item.coverage, 'maybe') === 0) return false;
  if (filters.coverage === 'gaps' && countCoverage(item.coverage, 'yes') >= 3) return false;
  return true;
}

function getLeagueSport(league) {
  const sportMap = {};
  leagueData.forEach(l => { sportMap[l.league] = l.sport; });
  if (sportMap[league]) return sportMap[league];
  // Fallback mappings for market sheet league names that differ slightly
  const l = league.toLowerCase();
  if (l.includes('mlb') || l.includes('kbo') || l.includes('npb') || l.includes('college baseball')) return 'Baseball';
  if (l.includes('nfl') || l.includes('cfb')) return 'American Football';
  if (l.includes('nba') || l.includes('wnba') || l.includes('pba') || l.includes('college basketball') || l.includes('euroleague') || l.includes('eurocup') || l.includes('acb') || l.includes('lba') || l.includes('bsl') || l.includes('nbl') || l.includes('cba') || l.includes('unrivaled') || l.includes('pro a') || l.includes('basket')) return 'Basketball';
  if (l.includes('pga') || l.includes('lpga')) return 'Golf';
  if (l.includes('atp') || l.includes('wta') || l.includes('grand slam') || l.includes('tennis')) return 'Tennis';
  if (l.includes('nhl') || l.includes('ahl') || l.includes('liiga') || l.includes('shl') || l.includes('del') || l.includes('extraliga') || l.includes('hockey')) return 'Hockey';
  if (l.includes('nascar') || l.includes('indy') || l.includes('f1')) return 'Motorsports';
  if (l.includes('ufc')) return 'MMA';
  if (l.includes('boxing')) return 'Boxing';
  if (l.includes('tt elite') || l.includes('table tennis') || l.includes('world table')) return 'Table Tennis';
  if (l.includes('cricket') || l.includes('ipl') || l.includes('t20') || l.includes('sheffield')) return 'Cricket';
  if (l.includes('nrl') || l.includes('rugby') || l.includes('six nations') || l.includes('top 14')) return 'Rugby';
  if (l.includes('darts')) return 'Darts';
  if (l.includes('lacrosse')) return 'Lacrosse';
  // Default: assume soccer for remaining league names
  return 'Soccer';
}

function filterMarket(item, filters) {
  if (filters.search && !item.market.toLowerCase().includes(filters.search) && !item.league.toLowerCase().includes(filters.search)) return false;
  if (filters.marketGroup && item.group !== filters.marketGroup) return false;
  if (filters.sport && getLeagueSport(item.league) !== filters.sport) return false;
  if (filters.liveDate && item.liveDate !== filters.liveDate) return false;
  if (filters.coverage === 'yes' && countCoverage(item.coverage, 'yes') === 0) return false;
  if (filters.coverage === 'maybe' && countCoverage(item.coverage, 'maybe') === 0) return false;
  if (filters.coverage === 'gaps' && countCoverage(item.coverage, 'yes') >= 3) return false;
  return true;
}

// ==================== RENDER GAP ANALYSIS ====================
function renderGaps() {
  const filters = getFilters();
  const critical = [];
  const warning = [];
  const good = [];

  leagueData.forEach(l => {
    if (filters.search && !l.league.toLowerCase().includes(filters.search) && !l.sport.toLowerCase().includes(filters.search)) return;
    if (filters.sport && l.sport !== filters.sport) return;
    if (filters.liveDate && l.liveDate !== filters.liveDate) return;
    const yesCount = countCoverage(l.coverage, 'yes');
    const item = {name: `${l.sport} - ${l.league}`, count: yesCount, type: 'league', liveDate: l.liveDate || ''};
    if (yesCount < 3) critical.push(item);
    else if (yesCount < 6) warning.push(item);
    else good.push(item);
  });

  marketData.forEach(m => {
    const sport = getLeagueSport(m.league);
    if (filters.search && !m.market.toLowerCase().includes(filters.search) && !m.league.toLowerCase().includes(filters.search) && !sport.toLowerCase().includes(filters.search)) return;
    if (filters.sport && sport !== filters.sport) return;
    if (filters.liveDate && m.liveDate !== filters.liveDate) return;
    const yesCount = countCoverage(m.coverage, 'yes');
    const item = {name: `${m.league || '(General)'} - ${m.market}`, count: yesCount, type: 'market', liveDate: m.liveDate || ''};
    if (yesCount < 3) critical.push(item);
    else if (yesCount < 6) warning.push(item);
    else good.push(item);
  });

  critical.sort((a,b) => a.count - b.count);
  warning.sort((a,b) => a.count - b.count);
  good.sort((a,b) => b.count - a.count);

  let html = '';

  if (critical.length > 0) {
    html += `<div class="gap-section"><h3 style="color:var(--red)">Critical Gaps (Less than 3 MMs confirmed) - ${critical.length} items</h3>`;
    critical.forEach(item => {
      html += `<div class="gap-item gap-critical"><span class="gap-name">${item.name}</span><span style="font-size:11px;color:var(--text-muted);margin-right:8px;">${item.type}</span><span style="font-size:11px;color:var(--text-secondary);margin-right:8px;">${item.liveDate || 'TBD'}</span><span class="gap-count">${item.count} MMs</span></div>`;
    });
    html += '</div>';
  }

  if (warning.length > 0) {
    html += `<div class="gap-section"><h3 style="color:var(--amber)">Moderate Coverage (3-5 MMs) - ${warning.length} items</h3>`;
    warning.forEach(item => {
      html += `<div class="gap-item gap-warning"><span class="gap-name">${item.name}</span><span style="font-size:11px;color:var(--text-muted);margin-right:8px;">${item.type}</span><span style="font-size:11px;color:var(--text-secondary);margin-right:8px;">${item.liveDate || 'TBD'}</span><span class="gap-count">${item.count} MMs</span></div>`;
    });
    html += '</div>';
  }

  if (good.length > 0) {
    html += `<div class="gap-section"><h3 style="color:var(--green)">Strong Coverage (6+ MMs) - ${good.length} items</h3>`;
    good.forEach(item => {
      html += `<div class="gap-item gap-good"><span class="gap-name">${item.name}</span><span style="font-size:11px;color:var(--text-muted);margin-right:8px;">${item.type}</span><span style="font-size:11px;color:var(--text-secondary);margin-right:8px;">${item.liveDate || 'TBD'}</span><span class="gap-count">${item.count} MMs</span></div>`;
    });
    html += '</div>';
  }

  document.getElementById('tab-gaps').innerHTML = html;
}

function editCell(td) {
  const type = td.dataset.type;
  const row = parseInt(td.dataset.row);
  const col = parseInt(td.dataset.col);
  const current = type === 'league' ? leagueData[row].coverage[col] : marketData[row].coverage[col];

  const values = ['Y', 'N', 'Maybe', ''];
  const currentNorm = normalize(current);
  let nextIdx = 0;
  if (currentNorm === 'yes') nextIdx = 1;
  else if (currentNorm === 'no') nextIdx = 2;
  else if (currentNorm === 'maybe') nextIdx = 3;
  else nextIdx = 0;

  const newVal = values[nextIdx];

  if (type === 'league') {
    leagueData[row].coverage[col] = newVal;
  } else {
    marketData[row].coverage[col] = newVal;
  }

  td.className = cellClass(newVal);
  td.textContent = cellDisplay(newVal);
  computeStats();
}

}

function exportCSV() {
  const activeTab = document.querySelector('.tab.active').dataset.tab;
  let csv = '';

  if (activeTab === 'markets') {
    csv = 'League,Market,Group,Live Date,' + MMs.join(',') + '\n';
    marketData.forEach(m => {
      csv += `"${m.league}","${m.market}","${m.group}",${m.liveDate || ''},${m.coverage.map(v => `"${v}"`).join(',')}\n`;
    });
  } else if (activeTab === 'leagues') {
    csv = 'Sport,League,Live Date,' + MMs.join(',') + '\n';
    leagueData.forEach(l => {
      csv += `"${l.sport}","${l.league}",${l.liveDate},${l.coverage.map(v => `"${v}"`).join(',')}\n`;
    });
  } else {
    csv = 'Type,Sport/League,Name,Group,Live Date,' + MMs.join(',') + '\n';
    leagueData.forEach(l => {
      csv += `League,"${l.sport}","${l.league}",,${l.liveDate},${l.coverage.map(v => `"${v}"`).join(',')}\n`;
    });
    marketData.forEach(m => {
      csv += `Market,"${m.league}","${m.market}","${m.group}",${m.liveDate || ''},${m.coverage.map(v => `"${v}"`).join(',')}\n`;
    });
  }

  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dkex-mm-coverage-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
}
